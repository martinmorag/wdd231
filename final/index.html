<body>
    <header>
        <div>
            <img src="images/logo.svg" alt="Site Logo" width="1" height="1">

                <form method="GET" action="discover.html">

                    <label><input type="radio" name="difficulty" value="hard" required> Hard</label>

                    <input type="submit" value="Choose difficulty">
                </form>
            </div>
        </section>

    <footer>
            <p>WDD231 Class Project</p>
